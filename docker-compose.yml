version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: aldebaran_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: aldebaran_password
      POSTGRES_DB: aldebaran
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aldebaran_backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://postgres:aldebaran_password@db:5432/aldebaran
    volumes:
      # O banco não está mais no sqlite local, mas mantemos o mapeamento para exportações (CSV)
      - ./backend/historico_alteracoes.csv:/app/historico_alteracoes.csv
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aldebaran_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  ngrok:
    image: ngrok/ngrok:latest
    container_name: aldebaran_ngrok
    restart: unless-stopped
    command:
      - "http"
      - "frontend:80"
      - "--domain=antsy-sprang-harness.ngrok-free.dev"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - frontend

volumes:
  postgres_data:
